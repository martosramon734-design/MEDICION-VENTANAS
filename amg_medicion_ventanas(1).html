  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root{--green:#087a36;--green2:#11a052;--ink:#202325;--muted:#727981;--bg:#f4f6f5;--card:#ffffff;--line:#dde5e0;--warn:#f5b400;--radius:22px;}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:linear-gradient(160deg,#f7faf8,#eef3f0);color:var(--ink)}
    header{position:sticky;top:0;z-index:10;backdrop-filter:blur(14px);background:rgba(255,255,255,.82);border-bottom:1px solid var(--line)}
    .top{display:flex;align-items:center;gap:12px;padding:12px 16px;max-width:1200px;margin:auto} .appicon{width:48px;height:48px;border-radius:14px;box-shadow:0 7px 20px #0002} h1{font-size:18px;margin:0;line-height:1.1} .sub{font-size:12px;color:var(--muted)}
    main{max-width:1200px;margin:0 auto;padding:14px;display:grid;grid-template-columns:1fr;gap:14px} @media(min-width:940px){main{grid-template-columns:390px 1fr}}
    .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:0 12px 35px #05391b10;overflow:hidden} .pad{padding:16px} .title{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px} h2{font-size:16px;margin:0} h3{font-size:14px;margin:16px 0 10px}
    label{display:block;font-size:12px;font-weight:700;color:#37413c;margin:10px 0 6px} input,select,textarea{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px 13px;font-size:15px;background:#fff;color:var(--ink);outline:none} input:focus,select:focus,textarea:focus{border-color:var(--green);box-shadow:0 0 0 4px #087a3614} textarea{min-height:70px;resize:vertical}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px} .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px} .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    button{border:0;border-radius:14px;padding:12px 14px;font-weight:800;cursor:pointer;background:#e8eee9;color:#1d2722} button.primary{background:linear-gradient(135deg,var(--green),var(--green2));color:white} button.dark{background:#242829;color:#fff} button.danger{background:#ffe6e6;color:#9b1111} button.small{padding:8px 10px;border-radius:11px;font-size:12px}
    .tabs{display:flex;background:#eef4f0;border-radius:15px;padding:4px;gap:4px} .tab{flex:1;background:transparent;padding:9px 5px;font-size:12px} .tab.active{background:white;box-shadow:0 4px 10px #0001}
    .section{display:none} .section.active{display:block} .pill{display:inline-flex;align-items:center;gap:6px;padding:6px 9px;border-radius:999px;background:#eef8f1;color:#086e32;font-size:12px;font-weight:800}
    .preview{min-height:260px;display:grid;place-items:center;background:radial-gradient(circle at top,#fff,#eef3f0);border-bottom:1px solid var(--line)} .window{width:min(78vw,460px);aspect-ratio:1.35;border:18px solid #222;border-radius:6px;position:relative;background:linear-gradient(135deg,#dfeee8,#f9ffff);box-shadow:inset 0 0 0 7px #3b3d3d,0 20px 30px #0002} .window:before{content:"";position:absolute;left:50%;top:0;bottom:0;width:12px;background:#202020;transform:translateX(-50%)} .window:after{content:"";position:absolute;inset:14px;background:linear-gradient(135deg,transparent 45%,rgba(255,255,255,.45) 46%,transparent 63%);pointer-events:none} .shutter{position:absolute;left:-18px;right:-18px;top:-52px;height:38px;background:#3a3a3a;border-radius:7px 7px 2px 2px;display:none} .shutter.show{display:block} .floor{position:absolute;left:-18px;right:-18px;bottom:-48px;height:30px;background:#b8b0a0;border-radius:2px;display:none} .floor.show{display:block} .openmark{position:absolute;inset:18px;border:3px dashed var(--green);clip-path:polygon(0 0,100% 50%,0 100%);display:none} .openmark.show{display:block} .fold{position:absolute;inset:16px;background:repeating-linear-gradient(90deg,transparent 0 18%,#222 18% 20%);display:none;opacity:.7} .fold.show{display:block}
    .list{display:grid;gap:10px} .item{border:1px solid var(--line);border-radius:17px;padding:12px;background:#fff} .itemtop{display:flex;justify-content:space-between;gap:10px} .ref{font-weight:900} .muted{color:var(--muted);font-size:12px} .empty{text-align:center;color:var(--muted);padding:24px}
    .footerbar{position:sticky;bottom:0;background:rgba(255,255,255,.9);border-top:1px solid var(--line);padding:10px;display:flex;gap:8px;backdrop-filter:blur(12px)} .footerbar button{flex:1}

    .interactive-preview{position:relative;min-height:330px;padding:10px;overflow:hidden}.interactive-preview svg{width:min(92vw,520px);height:auto;max-height:310px;display:block}.previewMeta{position:absolute;left:14px;right:14px;bottom:10px;text-align:center;color:#52605a;font-size:12px;font-weight:800;background:rgba(255,255,255,.78);border:1px solid #dde5e0;border-radius:999px;padding:7px 10px;backdrop-filter:blur(10px)}.svg-dim{font:700 12px Inter,system-ui,Arial;fill:#087a36}.svg-label{font:900 13px Inter,system-ui,Arial;fill:#202325}.svg-small{font:800 10px Inter,system-ui,Arial;fill:#52605a}.svg-note{font:900 11px Inter,system-ui,Arial;fill:#087a36}.svg-glass{fill:url(#glassGrad);stroke:#151819;stroke-width:3}.svg-frame{fill:#252728}.svg-line{stroke:#087a36;stroke-width:4;stroke-linecap:round;stroke-linejoin:round;fill:none}.svg-mark{stroke:#087a36;stroke-width:3;stroke-dasharray:7 5;fill:none}.svg-dark{stroke:#1e2223;stroke-width:4;stroke-linecap:round;fill:none}.svg-mesh{stroke:#087a36;stroke-width:.8;opacity:.28}.svg-shutter{fill:#333}.svg-floor{fill:#b8b0a0}.svg-handle{fill:#111}

      <div id="tab-int" class="section active"><div class="grid2"><div><label>Vidrio interior</label><input id="glassIn" placeholder="Ej: 4+4 bajo emisivo"></div><div><label>Tratamiento</label><input id="treatIn" placeholder="BE, control solar..."></div></div></div>
      <div id="tab-cam" class="section"><div class="grid2"><div><label>Cámara</label><input id="chamber" placeholder="Ej: 16 argón"></div><div><label>Intercalario</label><input id="spacer" placeholder="Aluminio / warm edge"></div></div></div>
      <div id="tab-ext" class="section"><div class="grid2"><div><label>Vidrio exterior</label><input id="glassOut" placeholder="Ej: 4 Guardian Sun"></div><div><label>Acabado</label><input id="finishOut" placeholder="Mate, parsol, templado..."></div></div></div>
      <h3>Persiana</h3><div class="grid2"><div><label>Lleva persiana</label><select id="hasShutter" onchange="updatePreview()"><option>No</option><option>Sí</option></select></div><div><label>Accionamiento</label><select id="shutterDrive"><option>No aplica</option><option>Cinta</option><option>Motor</option><option>Manivela</option></select></div></div>
      <label>Ancho cámara persiana interior marco → exterior guía mm</label><input id="shutterChamber" type="number" inputmode="numeric" placeholder="Ej: 185">
      <h3>Suelo</h3><div class="grid2"><div><label>Tipo de suelo/guía inferior</label><select id="floor" onchange="updatePreview()"><option>Normal</option><option>Integrado</option><option>Embutido</option></select></div><div><label>Medida/observación suelo</label><input id="floorNote" placeholder="Ej: guía a ras / solape"></div></div>
      <h3>Mosquitera</h3><div class="grid2"><div><label>Lleva mosquitera</label><select id="mosquito"><option>No</option><option>Sí</option></select></div><div><label>Tipo mosquitera</label><select id="mosquitoType"><option>No aplica</option><option>Plisada</option><option>Corredera</option><option>Enrollables</option><option>Enrollable</option><option>Fija</option></select></div></div>
      <label>Notas de esta ventana</label><textarea id="notes" placeholder="Detalles, color, compactos, tapajuntas..."></textarea>
      <div class="footerbar"><button class="primary" onclick="addWindow()">Guardar ventana</button><button class="dark" onclick="exportPDF()">PDF</button><button onclick="saveReport()">Guardar informe</button></div>
    </div>
  </section>

  <section class="card" style="grid-column:1/-1"><div class="pad"><div class="title"><h2>Ventanas del informe</h2><button class="small danger" onclick="clearWindows()">Vaciar</button></div><div id="windowList" class="list"></div></div></section>
</main>
<script>
const CORTIZO_SERIES = {
  'Corredera':['COR 2000 Corredera','Serie 4200 Corredera RPT','Serie 4500 Corredera Elevable RPT','Serie 4900 Corredera RPT','COR VISION Corredera Minimalista RPT','COR VISION PLUS','COR VISION GALANDAGE','Serie 4700 Corredera/Elevable RPT','Serie 4600 HI Corredera Elevable RPT','Otra / escribir en notas'],
  'Elevable':['Serie 4700 Corredera Elevable RPT','Serie 4600 HI Corredera Elevable RPT','COR VISION PLUS Elevable','COR VISION GALANDAGE','Otra / escribir en notas'],
  'Abatible':['Serie 3500 RPT Canal Europeo','COR 60 RPT Canal Europeo','COR 70 Industrial RPT','COR 70 Hoja Oculta RPT','COR 80 Industrial RPT','COR 80 Hoja Oculta RPT','COR 80 Passivhaus','Millennium Plus 70','Otra / escribir en notas'],
  'Oscilobatiente':['Serie 3500 RPT Canal Europeo','COR 60 RPT Canal Europeo','COR 70 Industrial RPT','COR 70 Hoja Oculta RPT','COR 80 Industrial RPT','COR 80 Hoja Oculta RPT','COR 80 Passivhaus','Otra / escribir en notas'],
  'Plegable':['Sistema Plegable Plus','COR 60 Plegable','COR 70 Plegable','Otra / escribir en notas'],
  'Fijo':['Sistema fijo Cortizo','COR 60 fijo','COR 70 fijo','COR 80 fijo','COR VISION fijo','Otra / escribir en notas']
};
let windows = []; let editingIndex = null;
const $ = id => document.getElementById(id);
function today(){ $('date').value = new Date().toISOString().slice(0,10); }
function fillSeries(){ const type=$('type').value; const val=$('series').value; $('series').innerHTML=(CORTIZO_SERIES[type]||[]).map(s=>`<option>${s}</option>`).join(''); if([...$('series').options].some(o=>o.value===val)) $('series').value=val; }
function updatePreview(){
  fillSeries();
  const svg=$('windowSvg'); if(!svg) return;
  const type=$('type').value, first=$('firstLeaf').value, hasShutter=$('hasShutter').value==='Sí', floor=$('floor').value, hasMosq=$('mosquito').value==='Sí';
  const w=parseFloat($('width').value)||1200, h=parseFloat($('height').value)||1200, leaves=Math.max(1, Math.min(6, parseInt($('leaves').value)||2));
  const maxW=300, maxH=210, ratio=Math.max(.35,Math.min(3.2,w/h));
  let fw=maxW, fh=fw/ratio; if(fh>maxH){fh=maxH; fw=fh*ratio;}
  const x=(420-fw)/2, y=hasShutter?72:48, mid=y+fh/2;
  const inner=14, ix=x+inner, iy=y+inner, iw=fw-inner*2, ih=fh-inner*2;
  const chamber=parseFloat($('shutterChamber').value)||0;
  const defs=`<defs><linearGradient id="glassGrad" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#dbeee7"/><stop offset="1" stop-color="#fbffff"/></linearGradient><marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#087a36"/></marker></defs>`;
  let out=defs;
  if(hasShutter){ out+=`<rect class="svg-shutter" x="${x-8}" y="${y-42}" width="${fw+16}" height="28" rx="6"/><text class="svg-note" x="210" y="${y-48}" text-anchor="middle">PERSIANA ${$('shutterDrive').value!=='No aplica'?'· '+$('shutterDrive').value:''}${chamber?' · cámara '+chamber+' mm':''}</text>`; }
  if(floor!=='Normal'){ out+=`<rect class="svg-floor" x="${x-10}" y="${y+fh+14}" width="${fw+20}" height="18" rx="3"/><text class="svg-small" x="210" y="${y+fh+46}" text-anchor="middle">Suelo/guía: ${floor}</text>`; }
  out+=`<rect class="svg-frame" x="${x}" y="${y}" width="${fw}" height="${fh}" rx="5"/><rect class="svg-glass" x="${ix}" y="${iy}" width="${iw}" height="${ih}" rx="2"/>`;
  // hojas
  const leafW=iw/leaves;
  for(let i=1;i<leaves;i++){ const lx=ix+leafW*i; out+=`<line class="svg-dark" x1="${lx}" y1="${iy}" x2="${lx}" y2="${iy+ih}"/>`; }
  out+=`<path d="M${ix+iw*.12} ${iy+ih*.22} L${ix+iw*.42} ${iy+ih*.22}" stroke="white" stroke-width="10" opacity=".34"/><path d="M${ix+iw*.20} ${iy+ih*.36} L${ix+iw*.56} ${iy+ih*.36}" stroke="white" stroke-width="8" opacity=".22"/>`;
  const leftFirst=first!=='Derecha';
  function triangle(side, tilt=false){ const sx=side==='left'?ix:ix+iw, ex=side==='left'?ix+leafW:ix+iw-leafW; out+=`<path class="svg-mark" d="M${sx} ${iy} L${ex} ${mid} L${sx} ${iy+ih}"/>`; if(tilt) out+=`<path class="svg-line" d="M${sx} ${iy} Q${(sx+ex)/2} ${iy+ih*.18} ${ex} ${iy+ih*.08}"/>`; }
  if(type==='Corredera'){
    out+=`<line class="svg-dark" x1="${ix}" y1="${iy+ih+8}" x2="${ix+iw}" y2="${iy+ih+8}"/><line class="svg-line" marker-end="url(#arrow)" x1="${ix+iw*.30}" y1="${mid}" x2="${ix+iw*.08}" y2="${mid}"/><line class="svg-line" marker-end="url(#arrow)" x1="${ix+iw*.70}" y1="${mid}" x2="${ix+iw*.92}" y2="${mid}"/><text class="svg-note" x="210" y="${y+fh+68}" text-anchor="middle">Corredera · deslizamiento horizontal</text>`;
  } else if(type==='Abatible'){
    triangle(leftFirst?'left':'right',false); out+=`<text class="svg-note" x="210" y="${y+fh+68}" text-anchor="middle">Abatible · abre primero ${first}</text>`;
  } else if(type==='Oscilobatiente'){
    triangle(leftFirst?'left':'right',true); out+=`<text class="svg-label" x="${ix+iw/2}" y="${iy+ih/2+5}" text-anchor="middle">OB</text><text class="svg-note" x="210" y="${y+fh+68}" text-anchor="middle">Oscilobatiente · apertura + abatimiento</text>`;
  } else if(type==='Elevable'){
    out+=`<line class="svg-line" marker-end="url(#arrow)" x1="${ix+iw*.35}" y1="${mid}" x2="${ix+iw*.12}" y2="${mid}"/><line class="svg-line" marker-end="url(#arrow)" x1="${ix+iw*.65}" y1="${mid}" x2="${ix+iw*.88}" y2="${mid}"/><line class="svg-line" marker-end="url(#arrow)" x1="${ix+iw*.50}" y1="${iy+ih*.75}" x2="${ix+iw*.50}" y2="${iy+ih*.30}"/><text class="svg-label" x="${ix+iw/2+18}" y="${iy+ih*.30}" text-anchor="start">HS</text><text class="svg-note" x="210" y="${y+fh+68}" text-anchor="middle">Elevable · corredera elevable</text>`;
  } else if(type==='Plegable'){
    let d=`M${ix} ${iy+ih} `; for(let i=0;i<leaves;i++){ const a=ix+leafW*i, b=ix+leafW*(i+1); d+=`L${(a+b)/2} ${iy} L${b} ${iy+ih} `; } out+=`<path class="svg-mark" d="${d}"/><text class="svg-note" x="210" y="${y+fh+68}" text-anchor="middle">Plegable · hojas en acordeón</text>`;
  } else { out+=`<text class="svg-label" x="${ix+iw/2}" y="${iy+ih/2+5}" text-anchor="middle">FIJO</text>`; }
  if(hasMosq){ for(let mx=ix; mx<=ix+iw; mx+=12) out+=`<line class="svg-mesh" x1="${mx}" y1="${iy}" x2="${mx}" y2="${iy+ih}"/>`; for(let my=iy; my<=iy+ih; my+=12) out+=`<line class="svg-mesh" x1="${ix}" y1="${my}" x2="${ix+iw}" y2="${my}"/>`; out+=`<text class="svg-small" x="${ix+iw}" y="${iy-8}" text-anchor="end">Mosquitera ${$('mosquitoType').value}</text>`; }
  // tirador aproximado
  out+=`<rect class="svg-handle" x="${leftFirst?ix+leafW-10:ix+iw-leafW+6}" y="${mid-18}" width="7" height="36" rx="4"/>`;
  // cotas
  out+=`<line class="svg-line" x1="${x}" y1="${y-16}" x2="${x+fw}" y2="${y-16}"/><text class="svg-dim" x="210" y="${y-23}" text-anchor="middle">${Math.round(w)} mm</text><line class="svg-line" x1="${x+fw+18}" y1="${y}" x2="${x+fw+18}" y2="${y+fh}"/><text class="svg-dim" x="${x+fw+32}" y="${y+fh/2}" transform="rotate(90 ${x+fw+32},${y+fh/2})" text-anchor="middle">${Math.round(h)} mm</text>`;
  svg.innerHTML=out;
  $('previewMeta').textContent=`${type} · ${Math.round(w)} x ${Math.round(h)} mm · ${leaves} hoja${leaves>1?'s':''}`;
}
function showTab(name,btn){ document.querySelectorAll('.section').forEach(s=>s.classList.remove('active')); document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); $('tab-'+name).classList.add('active'); btn.classList.add('active'); }
function readForm(){ return ['ref','width','height','type','series','leaves','firstLeaf','glassIn','treatIn','chamber','spacer','glassOut','finishOut','hasShutter','shutterDrive','shutterChamber','floor','floorNote','mosquito','mosquitoType','notes'].reduce((o,k)=>(o[k]=$(k).value,o),{}); }
function writeForm(w){ Object.keys(w).forEach(k=>{ if($(k)) $(k).value=w[k]||''; }); updatePreview(); }
function clearForm(){ ['ref','width','height','glassIn','treatIn','chamber','spacer','glassOut','finishOut','shutterChamber','floorNote','notes'].forEach(k=>$(k).value=''); $('type').value='Corredera'; $('leaves').value='2'; $('firstLeaf').value='Izquierda'; $('hasShutter').value='No'; $('shutterDrive').value='No aplica'; $('floor').value='Normal'; $('mosquito').value='No'; $('mosquitoType').value='No aplica'; editingIndex=null; updatePreview(); }
function addWindow(){ const w=readForm(); if(!w.ref) w.ref='V'+String(windows.length+1).padStart(2,'0'); if(!w.width||!w.height) return alert('Pon ancho y alto de la ventana.'); if(editingIndex!==null) windows[editingIndex]=w; else windows.push(w); renderList(); saveReport(true); clearForm(); }
function renderList(){ $('countPill').textContent=windows.length+' ventanas'; $('windowList').innerHTML = windows.length? windows.map((w,i)=>`<div class="item"><div class="itemtop"><div><div class="ref">${w.ref} · ${w.width} x ${w.height} mm</div><div class="muted">${w.type} · ${w.series} · ${w.leaves} hojas</div></div><div class="row"><button class="small" onclick="editWindow(${i})">Editar</button><button class="small danger" onclick="delWindow(${i})">Borrar</button></div></div><div class="muted">Persiana: ${w.hasShutter} ${w.shutterDrive} · Suelo: ${w.floor} · Mosquitera: ${w.mosquito} ${w.mosquitoType}</div></div>`).join('') : '<div class="empty">Aún no hay ventanas guardadas.</div>'; }
function editWindow(i){ editingIndex=i; writeForm(windows[i]); scrollTo({top:0,behavior:'smooth'}); } function delWindow(i){ if(confirm('¿Borrar esta ventana?')){ windows.splice(i,1); renderList(); saveReport(true); } } function clearWindows(){ if(confirm('¿Vaciar todas las ventanas?')){windows=[];renderList();saveReport(true)} }
function reportData(){ return {id: localStorage.amgCurrentId || ('r_'+Date.now()), name:$('reportName').value||'Informe sin nombre', client:$('client').value, date:$('date').value, notes:$('reportNotes').value, windows, updated:new Date().toISOString()} }
function allReports(){ return JSON.parse(localStorage.getItem('amgReports')||'[]'); } function setReports(r){ localStorage.setItem('amgReports',JSON.stringify(r)); refreshSaved(); }
function saveReport(silent=false){ let data=reportData(); localStorage.amgCurrentId=data.id; let arr=allReports(); const ix=arr.findIndex(x=>x.id===data.id); ix>=0?arr[ix]=data:arr.push(data); setReports(arr); if(!silent) alert('Informe guardado en la app.'); }
function refreshSaved(){ const arr=allReports().sort((a,b)=>b.updated.localeCompare(a.updated)); $('savedReports').innerHTML=arr.map(r=>`<option value="${r.id}">${r.name} · ${r.date||''}</option>`).join('')||'<option>No hay informes</option>'; }
function loadSelectedReport(){ const id=$('savedReports').value; const r=allReports().find(x=>x.id===id); if(!r)return; localStorage.amgCurrentId=r.id; $('reportName').value=r.name||''; $('client').value=r.client||''; $('date').value=r.date||''; $('reportNotes').value=r.notes||''; windows=r.windows||[]; renderList(); }
function deleteSelectedReport(){ const id=$('savedReports').value; if(!id||!confirm('¿Borrar informe guardado?'))return; setReports(allReports().filter(r=>r.id!==id)); if(localStorage.amgCurrentId===id) localStorage.removeItem('amgCurrentId'); }
function exportPDF(){ if(!windows.length) return alert('Añade al menos una ventana.'); const { jsPDF } = window.jspdf; const doc = new jsPDF(); const data=reportData(); let y=14; doc.setFont('helvetica','bold'); doc.setFontSize(16); doc.text('AMG Sistemas de Aluminio - Informe de medición',14,y); y+=8; doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.text(`Obra: ${data.name}`,14,y); y+=6; doc.text(`Cliente: ${data.client||'-'}    Fecha: ${data.date||'-'}`,14,y); y+=6; if(data.notes){doc.text(doc.splitTextToSize('Notas: '+data.notes,180),14,y); y+=12;} windows.forEach((w,i)=>{ if(y>252){doc.addPage(); y=14;} doc.setFillColor(8,122,54); doc.setTextColor(255,255,255); doc.rect(14,y,182,8,'F'); doc.setFont('helvetica','bold'); doc.text(`${i+1}. ${w.ref} · ${w.width} x ${w.height} mm`,16,y+5.5); y+=12; doc.setTextColor(25,25,25); doc.setFont('helvetica','normal'); const lines=[`Tipo: ${w.type} · Serie: ${w.series} · Hojas: ${w.leaves} · Abre primero: ${w.firstLeaf}`,`Vidrio: Interior ${w.glassIn||'-'} ${w.treatIn||''} / Cámara ${w.chamber||'-'} ${w.spacer||''} / Exterior ${w.glassOut||'-'} ${w.finishOut||''}`,`Persiana: ${w.hasShutter} · Accionamiento: ${w.shutterDrive} · Cámara persiana: ${w.shutterChamber||'-'} mm`,`Suelo: ${w.floor} · ${w.floorNote||'-'}`,`Mosquitera: ${w.mosquito} · Tipo: ${w.mosquitoType}`, w.notes?`Notas: ${w.notes}`:'' ].filter(Boolean); lines.forEach(t=>{ const split=doc.splitTextToSize(t,180); doc.text(split,16,y); y+=5*split.length+2; }); y+=3; }); doc.save((data.name||'informe_amg').replace(/[^a-z0-9áéíóúñ_-]/gi,'_')+'.pdf'); saveReport(true); }
['type','hasShutter','floor','mosquito','mosquitoType','leaves','firstLeaf','shutterDrive'].forEach(id=>$(id).addEventListener('change',updatePreview)); ['width','height','shutterChamber'].forEach(id=>$(id).addEventListener('input',updatePreview)); today(); updatePreview(); refreshSaved(); renderList();
if(allReports().length) loadSelectedReport();
</script>
</body></html>
